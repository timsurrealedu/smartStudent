<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SmartStudent Sync</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 0;
      width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      color: #1f2937;
      background: #ffffff;
    }
    .header {
      padding: 14px 16px;
      border-bottom: 1px solid #e5e7eb;
      background: #f9fafb;
    }
    .header h1 {
      margin: 0;
      font-size: 16px;
      font-weight: 600;
      color: #111827;
    }
    .header p {
      margin: 4px 0 0;
      font-size: 12px;
      color: #6b7280;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      padding: 12px 16px;
      border-bottom: 1px solid #e5e7eb;
    }
    .stat {
      text-align: center;
      padding: 8px;
      background: #f3f4f6;
      border-radius: 6px;
    }
    .stat-value {
      font-size: 18px;
      font-weight: 700;
      color: #111827;
    }
    .stat-label {
      font-size: 11px;
      color: #6b7280;
      margin-top: 2px;
    }
    .section {
      padding: 12px 16px;
      border-bottom: 1px solid #e5e7eb;
    }
    .section:last-child {
      border-bottom: none;
    }
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .row:last-child { margin-bottom: 0; }
    .label {
      font-size: 12px;
      color: #4b5563;
      font-weight: 500;
    }
    .value {
      font-size: 12px;
      color: #1f2937;
      font-weight: 600;
    }
    .btn {
      width: 100%;
      padding: 10px 12px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s ease;
    }
    .btn-primary {
      background: #2563eb;
      color: #fff;
    }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-primary:disabled {
      background: #93c5fd;
      cursor: not-allowed;
    }
    .btn-secondary {
      margin-top: 8px;
      background: #eef2ff;
      color: #3730a3;
    }
    .btn-secondary:hover { background: #e0e7ff; }
    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 12px;
      outline: none;
      font-family: monospace;
    }
    input[type="text"]:focus, input[type="password"]:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.15);
    }
    .hint {
      font-size: 11px;
      color: #9ca3af;
      margin-top: 4px;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      margin-top: 8px;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #9ca3af;
    }
    .dot.green { background: #16a34a; }
    .dot.red { background: #dc2626; }
    .token-masked {
      -webkit-text-security: disc;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>SmartStudent Sync</h1>
    <p>Auto-sync BinusMaya → SmartStudent</p>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-value" id="stat-courses">0</div>
      <div class="stat-label">Courses</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="stat-assignments">0</div>
      <div class="stat-label">Assignments</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="stat-grades">0</div>
      <div class="stat-label">Grades</div>
    </div>
  </div>

  <div class="section">
    <div class="row">
      <span class="label">Last Sync</span>
      <span class="value" id="last-sync">Never</span>
    </div>
    <div class="status" id="status-row">
      <div class="dot" id="status-dot"></div>
      <span id="status-text">Checking...</span>
    </div>
  </div>

  <div class="section">
    <button class="btn btn-primary" id="btn-sync">Sync Now</button>
    <button class="btn btn-secondary" id="btn-diagnostics">Copy Diagnostics</button>
  </div>

  <div class="section">
    <div class="row">
      <span class="label">Backend URL</span>
    </div>
    <input type="text" id="backend-url" value="http://localhost:3001/api" />
    <div class="hint">Your SmartStudent server address</div>

    <div class="row" style="margin-top:10px;">
      <span class="label">API Token</span>
    </div>
    <input type="password" id="api-token" placeholder="Paste token from SmartStudent app" />
    <div class="hint">
      In SmartStudent → DevTools → Application → Local Storage → copy <code>smartstudent-token</code>
    </div>
    <div class="status">
      <span id="save-status" style="font-size:11px;color:#6b7280;">Saved automatically</span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
